filePattern.description=A <a href="http://download.oracle.com/javase/7/docs/api/java/util/regex/Pattern.html">regular expression</a> \
                  matched against the file name of each issue. Leave blank to match all files.
messagePattern.description=A <a href="http://download.oracle.com/javase/7/docs/api/java/util/regex/Pattern.html">regular expression</a> \
                  matched against the warning message of each issue. Leave blank to match all messages. \
                  An issue is suppressed only when <em>both</em> the file name and the message patterns match.
